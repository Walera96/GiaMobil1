spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gia_db
    username: gia_user
    password: gia_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8090
  servlet:
    context-path: /api
